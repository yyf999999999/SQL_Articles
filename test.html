<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <title>test</title>
</head>
<body>
    <div class="first_layer_content">
        <h1>テストタイトル</h1>

        <h2 data-prefix="1">テスト単元1</h2>

        <div class="second_layer_content">
            <p>これは<span class="mask">テストページ</span>です。</p>
        </div>

        <h2 data-prefix="2">テスト単元2</h2>
        <div class="second_layer_content">
            <p>ここに<span class="mask">箇条書き</span>を作りたい。</p>
            <ul>
                <li>最初の項目</li>
                <li>二番目の項目</li>
                <li>三番目の項目</li>
            </ul>
        </div>

        <h2 data-prefix="3">テスト単元3</h2>
        <div class="second_layer_content">
            <p>ここに<span class="mask">プログラムコピペ機能</span>を作りたい。</p>
            <div class="code-card">
                <div class="code-header">
                    <span class="code-title">サンプルコード</span>
                    <button class="copy-btn" type="button">コピー</button>
                </div>
                <pre><code class="code-block">console.log("Hello World!");
    x = 5;
    y = 3;
    console.log(x + y);</code></pre>
            </div>
        </div>
    </div>
    <script type="text/javascript" src="script.js"></script>
</body>
</html>
